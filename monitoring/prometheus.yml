global:\n  scrape_interval: 15s\n  evaluation_interval: 15s\n  external_labels:\n    monitor: 'tiktok-clone-monitor'\n\nalerting:\n  alertmanagers:\n    - static_configs:\n        - targets: []\n\nscrape_configs:\n  # Prometheus self\n  - job_name: 'prometheus'\n    static_configs:\n      - targets: ['localhost:9090']\n\n  # Node Exporter (if added)\n  - job_name: 'node'\n    static_configs:\n      - targets: ['localhost:9100']\n\n  # TikTok Server\n  - job_name: 'tiktok-server'\n    scrape_interval: 10s\n    static_configs:\n      - targets: ['server:5000']\n    metrics_path: '/metrics'\n\n  # PostgreSQL (via postgres_exporter)\n  - job_name: 'postgres'\n    static_configs:\n      - targets: ['postgres:5432']\n\n  # Redis (via redis_exporter)\n  - job_name: 'redis'\n    static_configs:\n      - targets: ['redis:6379']\n\n  # IPFS\n  - job_name: 'ipfs'\n    static_configs:\n      - targets: ['ipfs:5001']\n\n  # MinIO\n  - job_name: 'minio'\n    metrics_path: /minio/v2/metrics/cluster\n    static_configs:\n      - targets: ['minio:9000']\n