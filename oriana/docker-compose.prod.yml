# Docker Compose Override for Production\n# Use with: docker-compose -f docker-compose.yml -f docker-compose.prod.yml\n\nversion: '3.9'\n\nservices:\n  postgres:\n    restart: always\n    environment:\n      POSTGRES_INITDB_ARGS: \"--encoding=UTF8 --lc-collate=C --lc-ctype=C --max_connections=500\"\n    volumes:\n      - postgres_data:/var/lib/postgresql/data\n      - ./scripts/backup:/backup\n\n  redis:\n    restart: always\n    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory 1gb --maxmemory-policy allkeys-lru\n    volumes:\n      - redis_data:/data\n\n  server:\n    restart: always\n    deploy:\n      replicas: 2\n      update_config:\n        parallelism: 1\n        delay: 10s\n      restart_policy:\n        condition: on-failure\n        delay: 5s\n        max_attempts: 3\n        window: 120s\n    environment:\n      NODE_ENV: production\n      LOG_LEVEL: info\n    volumes:\n      - ./apps/server/src:/app/src:ro\n      - ./apps/server/prisma:/app/prisma:ro\n\n  nginx:\n    restart: always\n    environment:\n      NGINX_CACHE_ENABLED: \"true\"\n\nvolumes:\n  postgres_data:\n    driver: local\n    driver_opts:\n      type: none\n      o: bind\n      device: /mnt/postgres-data\n  redis_data:\n    driver: local\n\nnetworks:\n  tiktok-net:\n    driver: bridge\n    ipam:\n      config:\n        - subnet: 172.25.0.0/16\n